<svg width="860" height="180" viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg     { fill: #0d1117; }
      .box    { fill: none; stroke: #00ff9d; stroke-width: 1; opacity: 0.5; }
      .grn    { fill: #00ff9d; font-family: 'Courier New', monospace; }
      .dim    { fill: #00884d; font-family: 'Courier New', monospace; }
      .corner { fill: #00ff9d; }

      .blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .scanline {
        stroke: #00ff9d;
        stroke-width: 120;
        stroke-opacity: 0.025;
        animation: scan 5s linear infinite;
      }
      @keyframes scan {
        0%   { transform: translateY(-120px); }
        100% { transform: translateY(300px); }
      }

      .f1 { animation: fadeIn 0.5s ease-out 0.1s both; }
      .f2 { animation: fadeIn 0.5s ease-out 0.4s both; }
      .f3 { animation: fadeIn 0.5s ease-out 0.7s both; }
      .f4 { animation: fadeIn 0.5s ease-out 1.0s both; }
      .f5 { animation: fadeIn 0.5s ease-out 1.3s both; }
      .f6 { animation: fadeIn 0.5s ease-out 1.6s both; }
      .f7 { animation: fadeIn 0.5s ease-out 1.9s both; }
      @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

      .pulse { animation: pulse 2.5s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="860" height="180"/>

  <!-- Scanline -->
  <line class="scanline" x1="0" y1="0" x2="860" y2="0"/>

  <!-- Outer border -->
  <rect class="box f1" x="8" y="8" width="844" height="164" rx="1"/>

  <!-- Corner ticks -->
  <rect class="corner f1" x="8"   y="8"   width="16" height="2"/>
  <rect class="corner f1" x="8"   y="8"   width="2"  height="16"/>
  <rect class="corner f1" x="836" y="8"   width="16" height="2"/>
  <rect class="corner f1" x="850" y="8"   width="2"  height="16"/>
  <rect class="corner f1" x="8"   y="170" width="16" height="2"/>
  <rect class="corner f1" x="8"   y="154" width="2"  height="18"/>
  <rect class="corner f1" x="836" y="170" width="16" height="2"/>
  <rect class="corner f1" x="850" y="154" width="2"  height="18"/>

  <!-- Top bar -->
  <text class="dim f1" x="24" y="23" font-size="11" letter-spacing="1">◈  CODEC SYSTEM — ACTIVE</text>
  <line class="box f1" x1="8" y1="30" x2="852" y2="30"/>

  <!-- Centered content block — labels left-aligned from center -->
  <text class="dim f2"  x="240" y="60"  font-size="10" letter-spacing="2">ROLE</text>
  <text class="grn f3"  x="295" y="60"  font-size="11" letter-spacing="1">Junior Software Developer</text>

  <text class="dim f3"  x="240" y="82"  font-size="10" letter-spacing="2">LOC</text>
  <text class="grn f4"  x="295" y="82"  font-size="11" letter-spacing="1">Alberta, Canada</text>

  <text class="dim f4"  x="240" y="104" font-size="10" letter-spacing="2">STACK</text>
  <text class="grn f5"  x="295" y="104" font-size="11" letter-spacing="1">React · Next.js · Node · Firebase · Azure</text>

  <text class="dim f5"  x="240" y="126" font-size="10" letter-spacing="2">STATUS</text>
  <text class="grn f6"  x="295" y="126" font-size="11" letter-spacing="1">● AVAILABLE FOR HIRE</text>

  <!-- Prompt line -->
  <text class="dim f6"  x="240" y="150" font-size="11">&gt;_</text>
  <text class="grn f7"  x="262" y="150" font-size="11" letter-spacing="1">full-stack dev  ·  ui/ux  ·  open-source enthusiast</text>
  <text class="grn blink f7" x="630" y="150" font-size="11">█</text>

  <!-- Signal bars bottom right -->
  <rect class="corner pulse f2" x="806" y="148" width="4" height="6"  rx="1"/>
  <rect class="corner pulse f2" x="814" y="144" width="4" height="10" rx="1"/>
  <rect class="corner pulse f2" x="822" y="139" width="4" height="15" rx="1"/>
  <rect class="corner pulse f2" x="830" y="134" width="4" height="20" rx="1"/>
</svg>
